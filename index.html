---
layout: default
title: "Home"
---
{% assign latest = site.posts.first %}
{% assign prev_post = site.posts[1] %}

{% if latest %}
  {% include thread-body.html post=latest %}

  <nav class="post-nav">
    {% if prev_post %}
      <a class="nav-prev" href="{{ prev_post.url | relative_url }}">← Предыдущий пост</a>
    {% endif %}
  </nav>
{% else %}
  <p class="empty">Постов пока нет.</p>
{% endif %}
