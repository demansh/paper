title: "Paper Project"
description: "Минималистичный тредовый журнал на Jekyll."
url: "https://demansh.github.io"
baseurl: "/paper"
image: /assets/images/android-chrome-512x512.png

lang: ru
future: true
permalink: /posts/:year/:month/:day/:slug/

plugins:
  - jekyll-seo-tag
  - jekyll-paginate

paginate: 10
paginate_path: "/page:num/"

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - node_modules/
  - README.md

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "thread"
