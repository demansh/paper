title: "Paper Project"
description: "A minimalist bilingual (RU/EN) threaded journal built with Jekyll."
baseurl: ""
url: "https://example.com"

lang: en
default_lang: en

plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - vendor/
  - .bundle/
  - node_modules/
  - README.md

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "thread"
