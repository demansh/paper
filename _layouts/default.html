<!DOCTYPE html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff" id="theme-color-meta">
  {% seo %}
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <script>
    (function () {
      try {
        var t = localStorage.getItem('paper.theme') || 'light';
        var l = localStorage.getItem('paper.lang') || '{{ site.default_lang | default: "en" }}';
        document.documentElement.setAttribute('data-theme', t);
        document.documentElement.setAttribute('data-lang', l);
      } catch (e) {}
    })();
  </script>
</head>
<body>
  <header class="site-header">
    <a class="site-title" href="{{ '/' | relative_url }}">{{ site.title }}</a>
    <div class="toggles">
      <button class="toggle toggle-lang" type="button" aria-label="Toggle language">
        <span data-lang-label="ru">RU</span><span class="sep">/</span><span data-lang-label="en">EN</span>
      </button>
      <button class="toggle toggle-theme" type="button" aria-label="Toggle theme">
        <span data-theme-label="light">☀</span><span data-theme-label="dark">☾</span>
      </button>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <small>© {{ 'now' | date: "%Y" }} {{ site.title }}</small>
  </footer>

  <script src="{{ '/assets/js/main.js' | relative_url }}" defer></script>
</body>
</html>
