name: Daily NASA Post

on:
  schedule:
    - cron: '0 2 * * *' 
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Run NASA script
        env:
          NASA_API_KEY: ${{ secrets.NASA_API_KEY }}
        run: python update_nasa.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "Aleksey Demshin"
          git config --global user.email "demansh17@gmail.com"
          git add _posts/
          git commit -m "Add NASA APOD post: $(date +'%Y-%m-%d')" || exit 0
          git push origin master
